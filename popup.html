<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CW to Personal</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 14px;
      width: 260px;
      background: #f8fafc;
      color: #0f172a;
    }
    .title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }
    label {
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    #status {
      min-height: 18px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #166534;
    }
    #openOptions {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    #openOptions:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <h1 class="title">CW → Personal</h1>
  <div class="row">
    <input id="extensionEnabled" type="checkbox" />
    <label for="extensionEnabled">機能を有効にする</label>
  </div>
  <div id="status" aria-live="polite"></div>
  <button id="openOptions" type="button">詳細設定を開く</button>
  <script src="popup.js"></script>
</body>
</html>
